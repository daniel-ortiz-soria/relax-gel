<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pausa IT - Lafuente Grupo Empresarial</title>
    <style>
        :root {
            --primary: #1a3a5a; 
            --green-it: #2d5a27;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #bg-image {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            filter: brightness(0.6);
            z-index: -1;
            transition: background-image 1.5s ease-in-out; 
        }

        .main-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 30px 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 90%;
        }

        /* Estilo para el nuevo logo con transparencia */
        .company-logo {
            width: 280px;
            margin-bottom: 20px;
            mix-blend-mode: multiply; 
        }

        .btn-relax {
            background: var(--green-it);
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.3s, background 0.3s;
            margin: 20px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn-relax:hover {
            transform: scale(1.05);
            background: #1e3d1a;
        }

        #timer-display {
            font-size: 3.5rem;
            font-weight: bold;
            color: var(--green-it);
            display: none;
            margin: 20px 0;
        }

        .tech-quote {
            font-size: 0.95rem;
            color: #444;
            font-style: italic;
            margin-top: 20px;
            border-top: 1px solid rgba(0,0,0,0.1);
            padding-top: 15px;
            line-height: 1.4;
        }

        #message-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--green-it);
            color: white;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 100;
            text-align: center;
            padding: 40px;
        }
    </style>
</head>
<body>

    <div id="bg-image"></div>

    <div class="main-card" id="interface">
        <img src="gel.png" alt="Lafuente Logo" class="company-logo">
        
        <h1>Pausa de Enfoque</h1>
        <p>Regálate estos 2 minutos de calma.</p>
        
        <button class="btn-relax" id="btn-main" onclick="iniciarRelajacion()">REINICIAR MENTE</button>
        
        <div id="timer-display">02:00</div>

        <div class="tech-quote" id="tech-msg">
            "En Tecnología también reiniciamos la mente, no solo los sistemas"
        </div>
    </div>

    <div id="message-overlay">
        <h1 id="frase-motivadora" style="font-size: 2.5rem; margin-bottom: 20px; line-height: 1.2;"></h1>
        <p style="font-size: 1.3rem; opacity: 0.9;">Sistema refrescado. Es momento de continuar.</p>
    </div>

    <audio id="audio-player"></audio>

    <script>
        // Selección de Música Instrumental Relajante
        const cancionesInstrumentales = [
            "trueno.mp3",
			"morconi2min.mp3",
            "mr-1.mp3",
            "mr-2.mp3",
            "mr-3.mp3"
        ];

        const imagenes = [
            "https://images.unsplash.com/photo-1441974231531-c6227db76b6e",
            "https://images.unsplash.com/photo-1501854140801-50d01698950b",
            "https://images.unsplash.com/photo-1470770841072-f978cf4d019e",
            "https://images.unsplash.com/photo-1447752875215-b2761acb3c5d",
            "https://images.unsplash.com/photo-1472214103451-9374bd1c798e",
            "https://images.unsplash.com/photo-1473448912268-2022ce9509d8",
			"https://images.unsplash.com/photo-1511497584788-876760111969",
			"https://images.unsplash.com/photo-1432405972618-c60b0225b8f9",
			"https://images.unsplash.com/photo-1537210249814-b9a10a161ae4",
			"https://images.unsplash.com/photo-1464822759023-fed622ff2c3b",
			"https://images.unsplash.com/photo-1502082553048-f009c37129b9"
        ];

        const frasesFinales = [
            "¡TRABAJA CON ENERGÍA!",
            "¡ERES CAPAZ DE LOGRARLO TODO!",
            "¡MENTE DESPEJADA, ÉXITO ASEGURADO!",
            "¡VUELVE CON FUERZA A TUS TAREAS!",
            "¡EL MOMENTO DE BRILLAR ES AHORA!"
        ];

        let intervaloFondo;

        function cambiarAmbiente() {
            const bg = document.getElementById('bg-image');
            const imgIndex = Math.floor(Math.random() * imagenes.length);
            bg.style.backgroundImage = `url('${imagenes[imgIndex]}?auto=format&fit=crop&w=1350&q=80')`;
        }

        function iniciarRelajacion() {
            const btn = document.getElementById('btn-main');
            const timerDisplay = document.getElementById('timer-display');
            const audio = document.getElementById('audio-player');
            const techMsg = document.getElementById('tech-msg');
            
            // Música Instrumental Aleatoria
            const trackRandom = cancionesInstrumentales[Math.floor(Math.random() * cancionesInstrumentales.length)];
            audio.src = trackRandom;
            audio.load();
            audio.play();

            cambiarAmbiente();
            // Cambio de fondo cada 10 segundos
            intervaloFondo = setInterval(cambiarAmbiente, 10000); 

            btn.style.display = 'none';
            techMsg.style.display = 'none'; 
            timerDisplay.style.display = 'block';

            let tiempoRestante = 120; 
            const intervaloReloj = setInterval(() => {
                tiempoRestante--;
                let min = Math.floor(tiempoRestante / 60);
                let seg = tiempoRestante % 60;
                timerDisplay.innerText = `${min.toString().padStart(2, '0')}:${seg.toString().padStart(2, '0')}`;

                if (tiempoRestante <= 0) {
                    clearInterval(intervaloReloj);
                    clearInterval(intervaloFondo);
                    finalizar();
                }
            }, 1000);
        }

        function finalizar() {
            const audio = document.getElementById('audio-player');
            audio.pause();
            
            const textoFrase = frasesFinales[Math.floor(Math.random() * frasesFinales.length)];
            document.getElementById('frase-motivadora').innerText = textoFrase;
            
            document.getElementById('message-overlay').style.display = 'flex';
        }

        window.onload = cambiarAmbiente;
    </script>
</body>
</html>
